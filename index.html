<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ร้านลูกชิ้น">
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>ร้านลูกชิ้นปิ้ง & น้ำ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>
  // apply dark mode before paint
  (function(){ if(localStorage.getItem('skewer_theme')==='dark') document.documentElement.setAttribute('data-theme','dark'); })();
</script>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="shop-name" id="shop-name-display">🏪 ร้านลูกชิ้นปิ้ง & น้ำ</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-right">
      <button class="hbtn" onclick="refreshSync()" title="sync">⟳</button>
      <button class="hbtn" onclick="toggleLang()" id="lang-btn">EN</button>
      <button class="hbtn" onclick="toggleDark()" id="dark-btn">🌙</button>
      <button class="hbtn" onclick="openSettings()">⚙️</button>
    </div>
  </header>

  <!-- Nav Tabs -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('summary')" id="tab-summary">
      <span class="tab-icon">📊</span><span id="tabl-summary">สรุป</span>
    </button>
    <button class="tab-btn" onclick="switchTab('record')" id="tab-record">
      <span class="tab-icon">✏️</span><span id="tabl-record">บันทึก</span>
    </button>
    <button class="tab-btn" onclick="switchTab('stock')" id="tab-stock">
      <span class="tab-icon">📦</span><span id="tabl-stock">สต็อก</span>
    </button>
    <button class="tab-btn" onclick="switchTab('report')" id="tab-report">
      <span class="tab-icon">📈</span><span id="tabl-report">รายงาน</span>
    </button>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- SUMMARY TAB -->
    <section id="sec-summary" class="tab-section active">
      <div class="metric-grid" id="summary-metrics"></div>
      <div class="two-col">
        <div class="card">
          <div class="card-title">🍢 <span id="lbl-skewer">ลูกชิ้นปิ้ง</span></div>
          <div id="skewer-summary"></div>
        </div>
        <div class="card">
          <div class="card-title">🧋 <span id="lbl-drink">เมนูน้ำ</span></div>
          <div id="drink-summary"></div>
        </div>
      </div>
      <div class="card" style="margin-top:1rem">
        <div class="card-title" id="lbl-recent">รายการล่าสุด</div>
        <div id="recent-list"></div>
      </div>
    </section>

    <!-- RECORD TAB -->
    <section id="sec-record" class="tab-section">
      <div class="card">
        <div class="card-title" id="lbl-add-title">เพิ่มรายการ</div>
        <div class="form-group">
          <label id="lbl-type">ประเภท</label>
          <select id="rec-type"></select>
        </div>
        <div class="form-group" style="position:relative">
          <label id="lbl-desc">รายละเอียด / ชื่อเมนู</label>
          <input type="text" id="rec-desc" placeholder="เช่น ลูกชิ้นหมู" autocomplete="off"
            oninput="onDescInput()" onfocus="onDescInput()" onblur="hideDropdown()">
          <div id="desc-dropdown" class="desc-dropdown" style="display:none"></div>
        </div>
        <div class="form-row3">
          <div class="form-group">
            <label id="lbl-unit-price">ราคา / หน่วย (บาท)</label>
            <input type="number" id="rec-unit-price" placeholder="0" min="0" inputmode="decimal"
              oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label id="lbl-qty">จำนวน</label>
            <input type="number" id="rec-qty" placeholder="1" min="1" value="1" inputmode="decimal"
              oninput="calcTotal()">
          </div>
          <div class="form-group">
            <label id="lbl-amount">รวม (บาท)</label>
            <input type="number" id="rec-amount" placeholder="0" min="0" inputmode="decimal"
              oninput="onManualAmount()">
          </div>
        </div>
        <div class="form-group">
          <label id="lbl-date">วันที่</label>
          <input type="date" id="rec-date">
        </div>
        <button class="btn btn-primary" onclick="addRecord()" id="btn-add-record">+ เพิ่มรายการ</button>
      </div>

      <!-- Menu List Manager -->
      <div class="card">
        <div class="card-title-row">
          <span id="lbl-menu-list">📋 รายการเมนู / วัตถุดิบ</span>
          <button class="btn btn-sm btn-outline" onclick="toggleMenuForm()" id="btn-toggle-menu">+ เพิ่ม</button>
        </div>
        <div id="menu-form" style="display:none;margin-bottom:12px">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label id="lbl-menu-name">รายการ</label>
              <input type="text" id="menu-name" placeholder="เช่น ลูกชิ้น">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label id="lbl-menu-price">ราคาปกติ (บาท)</label>
              <input type="number" id="menu-price" placeholder="0" min="0" inputmode="decimal">
            </div>
          </div>
          <div class="form-group" style="margin-top:10px;margin-bottom:0">
            <label id="lbl-menu-cat">หมวด</label>
            <select id="menu-cat">
              <option value="income-skewer">รายรับ — ลูกชิ้น</option>
              <option value="income-drink">รายรับ — น้ำ</option>
              <option value="expense-skewer">รายจ่าย — วัตถุดิบลูกชิ้น</option>
              <option value="expense-drink">รายจ่าย — วัตถุดิบน้ำ</option>
              <option value="expense-other">รายจ่าย — ค่าใช้จ่ายอื่นๆ</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addMenuItem()" id="btn-save-menu" style="margin-top:10px">+ บันทึกเมนู</button>
        </div>
        <div id="menu-items-list"></div>
      </div>

      <div class="card">
        <div class="card-title-row">
          <span id="lbl-all-records">รายการทั้งหมด</span>
          <div style="display:flex;gap:6px">
            <select id="filter-type" onchange="renderRecordList()" style="font-size:12px;padding:4px 8px">
              <option value="">ทั้งหมด</option>
            </select>
            <input type="month" id="filter-month" onchange="renderRecordList()" style="font-size:12px;padding:4px 8px">
          </div>
        </div>
        <div id="all-records-list"></div>
      </div>
    </section>

    <!-- STOCK TAB -->
    <section id="sec-stock" class="tab-section">
      <div class="card">
        <div class="card-title" id="lbl-add-stock-title">เพิ่ม/แก้ไขสต็อก</div>
        <div class="form-row">
          <div class="form-group">
            <label id="lbl-stock-name">ชื่อวัตถุดิบ</label>
            <input type="text" id="stock-name" placeholder="เช่น ลูกชิ้น">
          </div>
          <div class="form-group">
            <label id="lbl-stock-cat">หมวด</label>
            <select id="stock-cat"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label id="lbl-stock-qty">จำนวนปัจจุบัน</label>
            <input type="number" id="stock-qty" placeholder="0" min="0" inputmode="decimal">
          </div>
          <div class="form-group">
            <label id="lbl-stock-unit">หน่วย</label>
            <input type="text" id="stock-unit" placeholder="กก. / ลิตร / ชิ้น">
          </div>
        </div>
        <div class="form-group">
          <label id="lbl-stock-min">ปริมาณต่ำสุด (จะแจ้งเตือน)</label>
          <input type="number" id="stock-min" placeholder="0" min="0" inputmode="decimal">
        </div>
        <button class="btn btn-primary" onclick="addStock()" id="btn-add-stock">+ เพิ่มสต็อก</button>
      </div>

      <div class="card">
        <div class="card-title" id="lbl-stock-list">รายการสต็อก</div>
        <div id="stock-list"></div>
      </div>
    </section>

    <!-- REPORT TAB -->
    <section id="sec-report" class="tab-section">
      <div class="period-toggle">
        <button class="period-btn active" onclick="setPeriod('week')" id="btn-week">รายสัปดาห์</button>
        <button class="period-btn" onclick="setPeriod('month')" id="btn-month">รายเดือน</button>
        <button class="period-btn" onclick="setPeriod('custom')" id="btn-custom">กำหนดเอง</button>
      </div>
      <div id="custom-range" style="display:none" class="card" style="padding:0.75rem">
        <div class="form-row">
          <div class="form-group">
            <label id="lbl-from">จาก</label>
            <input type="date" id="range-from">
          </div>
          <div class="form-group">
            <label id="lbl-to">ถึง</label>
            <input type="date" id="range-to">
          </div>
        </div>
        <button class="btn btn-primary" onclick="renderReport()" id="btn-apply">ดูรายงาน</button>
      </div>
      <div class="metric-grid" id="report-metrics"></div>
      <div class="card">
        <div class="card-title" id="lbl-chart">กราฟรายรับ vs รายจ่าย</div>
        <div id="chart-container"></div>
        <div class="chart-legend">
          <span><span class="dot dot-income"></span><span id="leg-income">รายรับ</span></span>
          <span><span class="dot dot-expense"></span><span id="leg-expense">รายจ่าย</span></span>
        </div>
      </div>
      <div class="two-col" style="margin-top:1rem">
        <div class="card">
          <div class="card-title">🍢 <span id="lbl-skewer-rpt">ลูกชิ้น</span></div>
          <div id="skewer-report"></div>
        </div>
        <div class="card">
          <div class="card-title">🧋 <span id="lbl-drink-rpt">น้ำ</span></div>
          <div id="drink-report"></div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none" onclick="closeSettingsOutside(event)">
  <div class="modal-box">
    <div class="modal-title" id="lbl-settings">⚙️ ตั้งค่า</div>

    <div class="form-group">
      <label id="lbl-shop-name-setting">ชื่อร้าน</label>
      <input type="text" id="setting-shop-name" placeholder="ร้านลูกชิ้นปิ้ง & น้ำ">
    </div>

    <div class="form-group">
      <label id="lbl-backup-months">เก็บข้อมูลย้อนหลัง (เดือน)</label>
      <div class="backup-pills" id="backup-options">
        <button class="bk-pill" onclick="setBackupMonths(1)" id="bk-1">1 เดือน</button>
        <button class="bk-pill" onclick="setBackupMonths(3)" id="bk-3">3 เดือน</button>
        <button class="bk-pill" onclick="setBackupMonths(6)" id="bk-6">6 เดือน</button>
        <button class="bk-pill" onclick="setBackupMonths(12)" id="bk-12">12 เดือน</button>
        <button class="bk-pill" onclick="setBackupMonths(0)" id="bk-0">ไม่ลบ</button>
      </div>
      <div class="setting-hint" id="lbl-backup-hint"></div>
    </div>

    <div class="form-group">
      <label id="lbl-firebase-config">Firebase Config (สำหรับ sync)</label>
      <textarea id="setting-firebase" rows="4" placeholder='วาง Firebase config object ที่นี่...'></textarea>
      <div class="setting-hint" id="lbl-firebase-hint">ใส่ config เพื่อ sync ข้อมูลระหว่างอุปกรณ์ • ดูวิธีตั้งค่าใน README.md</div>
    </div>

    <div class="form-group">
      <label id="lbl-data-manage">จัดการข้อมูล</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline" onclick="exportData()" id="btn-export">📤 Export JSON</button>
        <button class="btn btn-outline" onclick="importData()" id="btn-import">📥 Import JSON</button>
        <button class="btn btn-danger-outline" onclick="runManualCleanup()" id="btn-cleanup">🗑️ ลบข้อมูลเก่า</button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-outline" onclick="closeSettings()" id="btn-cancel">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveSettings()" id="btn-save-settings">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
